{% extends "base.html" %}

{% block title %}500 - Server Error{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <i class="fas fa-server fa-5x"></i>
        <h1>500</h1>
        <h2>Internal Server Error</h2>
        <p>Something went wrong on our end. We're working to fix it!</p>
        <a href="{{ url_for('main.index') }}" class="btn-primary">
            <i class="fas fa-home"></i> Go Home
        </a>
    </div>
</div>

<style>
.error-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.error-content {
    text-align: center;
    color: var(--dark);
}

.error-content i {
    color: #F44336;
    margin-bottom: 1rem;
}

.error-content h1 {
    font-size: 5rem;
    margin: 1rem 0;
}

.error-content p {
    color: var(--gray);
    margin: 1rem 0 2rem;
}
</style>
{% endblock %}
