{% extends "base.html" %}

{% block title %}404 - Page Not Found{% endblock %}

{% block content %}
<div class="error-container">
    <div class="error-content">
        <i class="fas fa-exclamation-triangle fa-5x"></i>
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>The page you're looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('main.index') }}" class="btn-primary">
            <i class="fas fa-home"></i> Go Home
        </a>
    </div>
</div>

<style>
.error-container {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
}

.error-content {
    text-align: center;
    color: var(--dark);
}

.error-content i {
    color: var(--secondary);
    margin-bottom: 1rem;
}

.error-content h1 {
    font-size: 5rem;
    margin: 1rem 0;
}

.error-content p {
    color: var(--gray);
    margin: 1rem 0 2rem;
}
</style>
{% endblock %}
